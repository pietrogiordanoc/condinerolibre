<!DOCTYPE html>
<html lang="es" class="dark scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitar acceso al curso | ConDineroLibre</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" crossorigin href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#6BFF57",
            "background-dark": "#111818",
            "card-dark": "#151e1b",
          },
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #111818; }
  </style>

<link rel="stylesheet" href="/shared/cdl-shell.css">
</head>

<body class="dark:bg-background-dark text-gray-900 dark:text-gray-200 min-h-screen flex items-center justify-center p-4 antialiased">

  <form name="solicitud acceso Curso de Trading Master Gratuito" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="solicitud acceso Curso de Trading Master Gratuito" />
    <input type="hidden" name="subject" value="Solicitud Acceso - Curso Trading Master Gratuito" />
    <p class="hidden">
      <label>Don't fill this out if you're human: <input name="bot-field" /></label>
    </p>
    <input type="email" name="email" />
    <input type="text" name="nombre" />
    <input type="tel" name="telefono" />
    <input type="text" name="pais" />
    <input type="text" name="experiencia" />
    <textarea name="comentarios"></textarea>
  </form>

  <main class="w-full max-w-2xl mx-auto">
    <section class="bg-white dark:bg-card-dark rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-800 p-6 md:p-10">
      
      <div class="text-center mb-8">
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 dark:text-white mb-2">Solicita tu acceso</h1>
        <p id="subtituloPaso" class="text-gray-500 dark:text-gray-400 text-sm">Paso <span id="pasoNumero">1</span> de 2: Valida tu correo para continuar</p>
        <div class="mt-5 w-full max-w-md mx-auto h-2 rounded-full bg-black/10 dark:bg-white/10 overflow-hidden">
          <div id="barraProgreso" class="h-full w-1/2 bg-primary transition-all duration-500"></div>
        </div>
      </div>

      <div id="step1" class="space-y-6">
        <form id="formStep1" class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-2">Correo Electrónico</label>
            <input id="emailStep1" type="email" required placeholder="tu@email.com" class="block w-full p-3 rounded-lg border border-gray-700 bg-transparent focus:ring-2 focus:ring-primary outline-none" />
            <p id="errorEmail1" class="hidden mt-2 text-xs text-red-400">Email no válido</p>
          </div>
          <button type="submit" class="w-full py-3 rounded-lg font-extrabold text-black bg-primary hover:bg-green-400 transition-all flex justify-center items-center">
            Validar correo
          </button>
          <div class="flex justify-center items-center space-x-2 text-xs text-gray-500">
            <span class="material-icons-round text-base">lock</span>
            <span>Tu información está 100% segura</span>
          </div>
        </form>
      </div>

      <div id="step2" class="hidden space-y-6">
        <form id="formStep2" name="solicitud acceso Curso de Trading Master Gratuito" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="space-y-6">
          <input type="hidden" name="form-name" value="solicitud acceso Curso de Trading Master Gratuito" />
          <input type="hidden" name="subject" value="Solicitud Acceso - Curso Trading Master Gratuito" />
          <p class="hidden">
            <label>Don't fill this out if you're human: <input name="bot-field" /></label>
          </p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-2">Email (Confirmado)</label>
              <input id="emailStep2" name="email" type="email" readonly class="w-full p-3 rounded-lg bg-gray-800/50 border-none text-gray-400" />
            </div>
            
            <div>
              <label class="block text-sm font-medium mb-2">Nombre completo</label>
              <input id="nameStep2" name="nombre" type="text" required placeholder="Tu nombre" class="w-full p-3 rounded-lg bg-transparent border border-gray-700 focus:ring-primary focus:border-primary" />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2">País</label>
              <select id="countryStep2" name="pais" required class="w-full p-3 rounded-lg bg-[#151e1b] border border-gray-700 focus:ring-primary">
                <option value="">Selecciona tu país</option>
              </select>
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-2">Teléfono</label>
              <input id="phoneStep2" name="telefono" type="tel" required placeholder="Ej: +34 600 000 000" class="w-full p-3 rounded-lg bg-transparent border border-gray-700 focus:ring-primary" />
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-2" for="comentariosStep2">Mensaje o Nota (Opcional)</label>
              <textarea id="comentariosStep2" name="comentarios" rows="2" placeholder="¿Algo que quieras comentar?" class="w-full p-3 rounded-lg bg-transparent border border-gray-700 focus:ring-primary"></textarea>
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-2">¿Tienes experiencia en trading?</label>
              <div class="flex gap-4 mt-2">
                <label class="flex items-center"><input type="radio" name="experiencia" value="mucho" class="text-primary focus:ring-primary mr-2"> Mucho</label>
                <label class="flex items-center"><input type="radio" name="experiencia" value="poco" class="text-primary focus:ring-primary mr-2"> Poco</label>
                <label class="flex items-center"><input type="radio" name="experiencia" value="nada" class="text-primary focus:ring-primary mr-2" checked> Nada</label>
              </div>
            </div>
          </div>

          <div class="pt-4">
            <button id="btnEnviar" type="submit" class="w-full bg-primary hover:bg-green-400 text-black font-extrabold py-4 rounded-lg transition-all text-lg shadow-lg flex justify-center items-center gap-2">
              <span id="btnEnviarTxt">Solicitar el curso</span>
              <span id="btnEnviarSpin" class="hidden w-5 h-5 rounded-full border-2 border-black/40 border-t-black animate-spin"></span>
            </button>
            <p id="okMsg" class="hidden mt-4 text-center text-green-400 font-semibold">✅ ¡Listo! Recibirás tu acceso por email.</p>
            <p id="errMsg" class="hidden mt-4 text-center text-red-400 font-semibold">❌ Error al enviar. Intenta de nuevo.</p>
          </div>

          <button type="button" id="volverPaso1" class="w-full text-xs text-gray-500 hover:text-white underline">Volver al paso 1</button>
        </form>
      </div>

    </section>
  </main>

  <script>
    // 1. CARGA DE PAÍSES
    document.addEventListener('DOMContentLoaded', function() {
      const selectPais = document.getElementById('countryStep2');
      fetch('https://restcountries.com/v3.1/all?fields=name,idd,translations')
        .then(res => res.json())
        .then(data => {
          data.sort((a, b) => (a.translations?.spa?.common || a.name.common).localeCompare(b.translations?.spa?.common || b.name.common));
          data.forEach(c => {
            if (c.idd && c.idd.root) {
              const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : '');
              const nombre = c.translations?.spa?.common || c.name.common;
              const option = document.createElement('option');
              option.value = nombre;
              option.textContent = `${nombre} (${code})`;
              option.className = 'bg-card-dark';
              selectPais.appendChild(option);
            }
          });
        });
    });

    // 2. NAVEGACIÓN
    const s1 = document.getElementById('step1');
    const s2 = document.getElementById('step2');
    const f1 = document.getElementById('formStep1');
    const f2 = document.getElementById('formStep2');
    const barra = document.getElementById('barraProgreso');
    const pasoNum = document.getElementById('pasoNumero');
    const subtitulo = document.getElementById('subtituloPaso');

    f1.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('emailStep1').value;
      s1.classList.add('hidden');
      s2.classList.remove('hidden');
      document.getElementById('emailStep2').value = email;
      barra.style.width = "100%";
      pasoNum.textContent = "2";
      subtitulo.textContent = "Paso 2 de 2: Completa tus datos";
    });

    document.getElementById('volverPaso1').addEventListener('click', () => {
      s2.classList.add('hidden');
      s1.classList.remove('hidden');
      barra.style.width = "50%";
      pasoNum.textContent = "1";
      subtitulo.textContent = "Paso 1 de 2: Valida tu correo para continuar";
    });

    // 3. ENVÍO REAL A NETLIFY
    f2.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnEnviar');
      const spin = document.getElementById('btnEnviarSpin');
      const txt = document.getElementById('btnEnviarTxt');
      
      btn.disabled = true;
      spin.classList.remove('hidden');
      txt.textContent = "Enviando...";

      const formData = new FormData(f2);
      
      fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(formData).toString()
      })
      .then((response) => {
        if (response.ok) {
          spin.classList.add('hidden');
          txt.textContent = "¡Enviado!";
          document.getElementById('okMsg').classList.remove('hidden');
          // Opcional: redirigir después de 2 segundos
          setTimeout(() => {
            window.location.href = '/cursos/curso-de-trading-master-gratuito/';
          }, 2000);
        } else {
          throw new Error('Error en la respuesta');
        }
      })
      .catch((error) => {
        console.error('Error:', error);
        spin.classList.add('hidden');
        txt.textContent = "Solicitar el curso";
        document.getElementById('errMsg').classList.remove('hidden');
        btn.disabled = false;
      });
    });
  </script>

<script defer src="/shared/cdl-shell.js"></script>
</body>
</html>
