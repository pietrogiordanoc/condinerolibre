<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <title>Crear cuenta · CDL Portal</title>

  <!-- hCaptcha -->
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family: Arial, sans-serif;
      min-height:100vh;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .box {
      width:100%;
      max-width:520px;
      background:#141414;
      padding:32px;
      border-radius:14px;
      border:1px solid #222;
      box-shadow:0 20px 50px rgba(0,0,0,.6);
    }
    h1 { text-align:center; margin:0 0 12px; font-size:2rem; }
    p.subtitle {
      text-align:center;
      margin:0 0 18px;
      color:#bdbdbd;
      font-size:.95rem;
    }
    label { display:block; margin-top:14px; font-size:.9rem; color:#ccc; }
    input {
      width:100%;
      margin-top:6px;
      padding:10px;
      border-radius:8px;
      border:1px solid #333;
      background:#1f1f1f;
      color:#fff;
      font-size:1rem;
    }
    button {
      width:100%;
      margin-top:18px;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#22c55e;
      color:#001;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
    }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .msg { margin-top:14px; text-align:center; font-size:.95rem; }
    .links {
      margin-top:18px;
      text-align:center;
      font-size:.9rem;
    }
    .links a { color:#7dd3fc; text-decoration:none; }
    .links a:hover { text-decoration:underline; }
    small {
      display:block;
      margin-top:12px;
      color:#9ca3af;
      line-height:1.35;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Crear cuenta CDL</h1>
    <p class="subtitle">
      Regístrate y te avisaremos cuando el dashboard esté disponible.
    </p>

    <form id="register-form">
      <label for="name">Nombre <span style="color:salmon">(obligatorio)</span></label>
      <input type="text" id="name" placeholder="Tu nombre" required />

      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="password">Contraseña</label>
      <input type="password" id="password" minlength="6" required />

      <!-- hCaptcha (UNO SOLO, SITEKEY CORRECTA) -->
      <div style="margin-top:14px; display:flex; justify-content:center;">
        <div class="h-captcha"
             data-sitekey="75f2aeac-03f2-4250-9326-2598cc5caf9c"></div>
      </div>

      <button id="submitBtn" type="submit">Crear cuenta</button>

      <small>
        Luego podrás iniciar sesión desde el portal.
      </small>
    </form>

    <div class="msg" id="msg"></div>

    <div class="links">
      ¿Ya tienes cuenta? <a href="/login/">Inicia sesión</a>
    </div>
  </div>

  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yhgqmbexjscojlrzguvh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZ3FtYmV4anNjb2pscnpndXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzA1NTcsImV4cCI6MjA4Mjc0NjU1N30.uXFLknfgsZ_3yH5t9cW0dfbwN_b3uOi6jcfM06inVu4";

    window._sb = window._sb || supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );
    const sb = window._sb;

    const form = document.getElementById("register-form");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");

    function show(text, color="#ccc") {
      msg.textContent = text;
      msg.style.color = color;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      show("Creando cuenta…");

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      // Validar que el nombre tenga al menos un carácter visible
      if (!name || name.length < 2) {
        show("❌ Ingresa un nombre válido (mínimo 2 letras).", "salmon");
        submitBtn.disabled = false;
        return;
      }

      const captchaToken =
        document.querySelector('[name="h-captcha-response"]')?.value;

      if (!captchaToken) {
        show("❌ Completa el captcha.", "salmon");
        submitBtn.disabled = false;
        return;
      }

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { name },
          captchaToken: captchaToken
        }
      });

      if (error) {
        show("❌ " + error.message, "salmon");
        submitBtn.disabled = false;
        if (window.hcaptcha) window.hcaptcha.reset();
        return;
      }

      show("✅ Cuenta creada. Redirigiendo…", "#7CFCB2");
      setTimeout(() => {
        window.location.href = "/gracias/";
      }, 700);
    });
  </script>
</body>
</html>
