<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Radar Usage SQL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #00ff00;
      padding: 20px;
      margin: 0;
    }
    h1 { color: #00ff00; border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
    button {
      background: #00ff00;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
      font-weight: bold;
    }
    button:hover { background: #00cc00; }
    pre {
      background: #1a1a1a;
      border: 1px solid #00ff00;
      padding: 15px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 600px;
      overflow-y: auto;
    }
    .query {
      background: #1a1a1a;
      border-left: 3px solid #ffaa00;
      padding: 10px;
      margin: 10px 0;
      color: #ffaa00;
    }
    .error { color: #ff0000; }
    .success { color: #00ff00; }
    .info { color: #00aaff; }
  </style>
</head>
<body>
  <h1>🔍 Test Radar Usage - Supabase SQL</h1>
  
  <div class="info">
    <strong>Proyecto:</strong> yhgqmbexjscojlrzguvh<br>
    <strong>Tabla:</strong> radar_daily_usage<br>
    <strong>Fecha HOY:</strong> <span id="today"></span>
  </div>

  <button onclick="testQuery1()">📊 Ver todos los registros de HOY</button>
  <button onclick="testQuery2()">📊 Ver TODOS los registros (últimos 10)</button>
  <button onclick="testQuery3()">📊 Contar usuarios con uso HOY</button>
  <button onclick="testQuery4()">📊 Ver estructura de tabla</button>

  <div id="output"></div>

  <script>
    const SUPABASE_URL = "https://yhgqmbexjscojlrzguvh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZ3FtYmV4anNjb2pscnpndXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzA1NTcsImV4cCI6MjA4Mjc0NjU1N30.uXFLknfgsZ_3yH5t9cW0dfbwN_b3uOi6jcfM06inVu4";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const output = document.getElementById("output");

    const today = new Date().toISOString().split('T')[0];
    document.getElementById("today").textContent = today;

    function log(msg, type = 'success') {
      const div = document.createElement('div');
      div.className = type;
      div.innerHTML = msg;
      output.appendChild(div);
    }

    function logQuery(query) {
      const div = document.createElement('div');
      div.className = 'query';
      div.textContent = '🔎 Query: ' + query;
      output.appendChild(div);
    }

    function logResult(data) {
      const pre = document.createElement('pre');
      pre.textContent = JSON.stringify(data, null, 2);
      output.appendChild(pre);
    }

    async function testQuery1() {
      output.innerHTML = '';
      log(`<h3>📊 Registros de HOY (${today})</h3>`, 'info');
      logQuery(`SELECT * FROM radar_daily_usage WHERE usage_date = '${today}'`);
      
      const { data, error } = await supabase
        .from("radar_daily_usage")
        .select("*")
        .eq("usage_date", today);
      
      if (error) {
        log(`❌ Error: ${error.message}`, 'error');
      } else {
        log(`✅ Encontrados: ${data.length} registros`, 'success');
        logResult(data);
      }
    }

    async function testQuery2() {
      output.innerHTML = '';
      log('<h3>📊 Últimos 10 registros (cualquier fecha)</h3>', 'info');
      logQuery('SELECT * FROM radar_daily_usage ORDER BY updated_at DESC LIMIT 10');
      
      const { data, error } = await supabase
        .from("radar_daily_usage")
        .select("*")
        .order("updated_at", { ascending: false })
        .limit(10);
      
      if (error) {
        log(`❌ Error: ${error.message}`, 'error');
      } else {
        log(`✅ Encontrados: ${data.length} registros`, 'success');
        logResult(data);
      }
    }

    async function testQuery3() {
      output.innerHTML = '';
      log(`<h3>📊 Conteo de usuarios con uso HOY (${today})</h3>`, 'info');
      logQuery(`SELECT user_id, seconds_used FROM radar_daily_usage WHERE usage_date = '${today}'`);
      
      const { data, error, count } = await supabase
        .from("radar_daily_usage")
        .select("user_id, seconds_used", { count: 'exact' })
        .eq("usage_date", today);
      
      if (error) {
        log(`❌ Error: ${error.message}`, 'error');
      } else {
        log(`✅ Total usuarios: ${count || 0}`, 'success');
        logResult(data);
      }
    }

    async function testQuery4() {
      output.innerHTML = '';
      log('<h3>📊 Primeros 5 registros para ver estructura</h3>', 'info');
      logQuery('SELECT * FROM radar_daily_usage LIMIT 5');
      
      const { data, error } = await supabase
        .from("radar_daily_usage")
        .select("*")
        .limit(5);
      
      if (error) {
        log(`❌ Error: ${error.message}`, 'error');
      } else {
        log(`✅ Registros encontrados: ${data.length}`, 'success');
        if (data.length > 0) {
          log(`<strong>Columnas disponibles:</strong> ${Object.keys(data[0]).join(', ')}`, 'info');
        }
        logResult(data);
      }
    }

    // Auto-ejecutar al cargar
    window.onload = () => {
      log('🚀 Página cargada. Haz clic en los botones para consultar la base de datos.', 'info');
    };
  </script>
</body>
</html>
