<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>Contacto · ConDineroLibre</title>
  <meta name="description" content="Contacto general ConDineroLibre. Envíanos tu consulta y te responderemos lo antes posible." />
  <link rel="icon" href="/favicon.ico" />

  <style>
    #contact-content-wrapper {
      min-height: calc(100vh - 82px);
      padding-top: 120px;
      padding-bottom: 60px;
      background:
        radial-gradient(900px 500px at 12% 0%, rgba(107,255,87,.10), transparent 60%),
        radial-gradient(900px 500px at 88% 12%, rgba(57,217,138,.10), transparent 60%),
        #0b0b0c;
    }
    
    .contact-wrap{
      max-width:920px; 
      margin:0 auto; 
      padding:24px;
    }
    
    .contact-card{
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      box-shadow:0 10px 35px rgba(0,0,0,.45);
      padding:32px;
    }
    
    .contact-kicker{
      color:#39d98a;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.78rem;
      margin-bottom:8px;
    }
    
    .contact-card h1{
      margin:8px 0 16px;
      font-size:clamp(1.8rem,2.5vw,2.4rem);
      line-height:1.15;
      color:#ffffff;
      font-weight:700;
    }
    
    .contact-card p{
      margin:0 0 24px;
      color:#b8b8b8;
      line-height:1.6;
    }

    .contact-card form{margin-top:10px}
    .contact-card label{
      display:block;
      font-weight:700;
      margin:16px 0 8px;
      font-size:.95rem;
      color:#ffffff;
    }
    
    .contact-card input,
    .contact-card select,
    .contact-card textarea{
      width:100%; 
      padding:12px 14px; 
      border-radius:10px;
      border:1px solid rgba(255,255,255,.12);
      background:#0b0b0c;
      color:#ffffff; 
      outline:none;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size:1rem;
      transition: all 0.2s ease;
    }

    .contact-card select, 
    .contact-card select option {
      background:#0b0b0c !important;
      color:#ffffff !important;
    }
    
    .contact-card textarea{
      min-height:140px;
      resize:vertical;
    }
    
    .contact-card input:focus,
    .contact-card select:focus,
    .contact-card textarea:focus{
      border-color: rgba(107,255,87,.65);
      box-shadow: 0 0 0 4px rgba(107,255,87,.12);
    }
    
    .contact-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    
    @media(max-width:820px){
      .contact-row{grid-template-columns:1fr}
      .contact-card{padding:24px}
    }

    .contact-actions{
      margin-top:24px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    
    .contact-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 28px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      color:#ffffff; 
      font-weight:700; 
      cursor:pointer;
      text-decoration:none;
      font-size:1rem;
      transition: all 0.2s ease;
    }
    
    .contact-btn:hover{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.2);
    }
    
    .contact-btn-primary{
      background:linear-gradient(135deg, rgba(107,255,87,.95), rgba(57,217,138,.95));
      border-color:transparent; 
      color:#0b0b0c;
      font-weight:800;
    }
    
    .contact-btn-primary:hover{
      background:linear-gradient(135deg, rgba(107,255,87,1), rgba(57,217,138,1));
      transform:translateY(-1px);
      box-shadow:0 4px 12px rgba(107,255,87,.3);
    }
    
    .contact-fine{
      margin-top:16px;
      font-size:.88rem;
      color:#9fb0bf;
    }
    
    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      border:0;
    }
  </style>
  <link rel="stylesheet" href="/shared/cdl-shell.css">
</head>

<body>
  <div id="contact-content-wrapper">
    <div class="contact-wrap">
      <main class="contact-card">
        <div class="contact-kicker">Contacto general</div>
        <h1>Escríbenos</h1>
        <p>Te respondemos por email. Si es un tema técnico, describe los pasos y el error exacto.</p>

        <form name="contacto-cdl" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contacto/gracias/">
          <input type="hidden" name="form-name" value="contacto-cdl" />
          <p class="sr-only">
            <label>No rellenes esto: <input name="bot-field" /></label>
          </p>

          <!-- Origen para saber desde qué proyecto vino -->
          <input type="hidden" name="origen" id="origen" />
          <input type="hidden" name="pagina" id="pagina" />

          <div class="contact-row">
            <div>
              <label for="nombre">Nombre *</label>
              <input id="nombre" name="nombre" autocomplete="name" required />
            </div>
            <div>
              <label for="email">Email *</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
          </div>

          <label for="tema">Tema *</label>
          <select id="tema" name="tema" required>
            <option value="" selected disabled>Selecciona…</option>
            <option>Formación</option>
            <option>Portal (login/registro)</option>
            <option>Brokers / Afiliación</option>
            <option>Prop Firms</option>
            <option>Negocio / Colaboración</option>
            <option>Otro</option>
          </select>

          <label for="mensaje">Mensaje *</label>
          <textarea id="mensaje" name="mensaje" required placeholder="Cuéntanos tu caso en 3–6 líneas."></textarea>

          <div class="contact-actions">
            <button class="contact-btn contact-btn-primary" type="submit">Enviar</button>
            <a class="contact-btn" href="https://www.condinerolibre.com/">Volver</a>
          </div>

          <div class="contact-fine">
            Aviso: contenido educativo. No es asesoramiento financiero.
          </div>
        </form>
      </main>
    </div>
  </div>

  <script>
    document.getElementById("origen").value = document.referrer || "directo";
    document.getElementById("pagina").value = location.href;
  </script>
  <script defer src="/shared/cdl-shell.js"></script>
</body>
</html>
