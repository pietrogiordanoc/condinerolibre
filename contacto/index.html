<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />

  <meta name="description" content="Contacto general ConDineroLibre. Envíanos tu consulta y te responderemos lo antes posible." />
  <link rel="canonical" href="https://www.condinerolibre.com/contacto/" />
  <meta name="robots" content="index,follow" />

  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Contacto · ConDineroLibre</title>

  <!-- Fonts / Icons / Tailwind -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Noto+Sans:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#39E079",
            "background-light": "#f6f8f7",
            "background-dark": "#122017",
            "surface-dark": "#1c2633",
            "surface-darker": "#111822"
          },
          fontFamily: {
            display: "Lexend",
            body: ["Noto Sans", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    html { scroll-behavior: smooth; }
  </style>

  <link rel="stylesheet" href="/shared/cdl-shell.css">
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-50 font-display antialiased selection:bg-primary selection:text-white">

  <!-- Header y mobile menu se cargan dinámicamente desde /shared/header.html -->

<!-- MAIN CONTENT -->
<main class="relative flex flex-col items-center w-full min-h-screen pt-8 pb-20">
  <div class="w-full max-w-4xl px-4 md:px-8">

    <!-- FORM CONTENT -->
    <article class="flex flex-col gap-8">

      <!-- HERO SECTION -->
      <div class="flex flex-col gap-6 border-b border-slate-800 pb-8">
          <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-400/20 w-fit">
            <span class="material-symbols-outlined text-emerald-300 text-sm">mail</span>
            <span class="text-emerald-200 text-xs font-bold uppercase tracking-wider">Contacto general</span>
          </div>

          <h1 class="text-white text-3xl md:text-4xl lg:text-5xl font-black leading-[1.1] tracking-[-0.033em]">
            Escríbenos
          </h1>

          <p class="text-slate-400 text-lg md:text-xl font-normal leading-relaxed max-w-3xl">
            Te respondemos por email. Si es un tema técnico, describe los pasos y el error exacto.
          </p>
      </div>

      <!-- CONTACT FORM -->
      <div class="bg-surface-dark border border-slate-800 rounded-2xl p-6 md:p-8">
        <form name="contacto-cdl" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contacto/gracias/" class="flex flex-col gap-6">
          <input type="hidden" name="form-name" value="contacto-cdl" />
          <p class="hidden">
            <label>No rellenes esto: <input name="bot-field" /></label>
          </p>

          <!-- Origen para saber desde qué proyecto vino -->
          <input type="hidden" name="origen" id="origen" />
          <input type="hidden" name="pagina" id="pagina" />

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="nombre" class="block text-white font-bold text-sm mb-2">Nombre *</label>
              <input 
                id="nombre" 
                name="nombre" 
                autocomplete="name" 
                required 
                class="w-full px-4 py-3 bg-surface-darker border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              />
            </div>
            <div>
              <label for="email" class="block text-white font-bold text-sm mb-2">Email *</label>
              <input 
                id="email" 
                name="email" 
                type="email" 
                autocomplete="email" 
                required 
                class="w-full px-4 py-3 bg-surface-darker border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              />
            </div>
          </div>

          <div>
            <label for="tema" class="block text-white font-bold text-sm mb-2">Tema *</label>
            <select 
              id="tema" 
              name="tema" 
              required 
              class="w-full px-4 py-3 bg-surface-darker border border-slate-700 rounded-lg text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
            >
              <option value="" selected disabled>Selecciona…</option>
              <option>Formación</option>
              <option>Portal (login/registro)</option>
              <option>Brokers / Afiliación</option>
              <option>Prop Firms</option>
              <option>Negocio / Colaboración</option>
              <option>Otro</option>
            </select>
          </div>

          <div>
            <label for="mensaje" class="block text-white font-bold text-sm mb-2">Mensaje *</label>
            <textarea 
              id="mensaje" 
              name="mensaje" 
              required 
              placeholder="Cuéntanos tu caso en 3–6 líneas."
              rows="6"
              class="w-full px-4 py-3 bg-surface-darker border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition resize-vertical"
            ></textarea>
          </div>

          <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button 
              type="submit" 
              class="px-8 py-3 bg-gradient-to-r from-emerald-500 to-primary text-black font-bold rounded-lg hover:from-emerald-400 hover:to-emerald-300 transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-[1.02]"
            >
              Enviar
            </button>
            <a 
              href="https://www.condinerolibre.com/" 
              class="px-8 py-3 bg-surface-darker border border-slate-700 text-white font-bold rounded-lg hover:bg-slate-800 hover:border-slate-600 transition-all duration-300 text-center"
            >
              Volver
            </a>
          </div>

          <p class="text-slate-500 text-sm">
            Aviso: contenido educativo. No es asesoramiento financiero.
          </p>
        </form>
      </div>

    </article>

  </div>
</main>

  <!-- Footer se carga dinámicamente desde /shared/footer.html -->

  <script>
    document.getElementById("origen").value = document.referrer || "directo";
    document.getElementById("pagina").value = location.href;
  </script>
  <script defer src="/shared/cdl-shell.js"></script>
</body>
</html>
