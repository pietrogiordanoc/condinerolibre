<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>Contacto · ConDineroLibre</title>
  <meta name="description" content="Contacto general ConDineroLibre. Envíanos tu consulta y te responderemos lo antes posible." />
  <link rel="icon" href="/favicon.ico" />

  <style>
    :root{
      --bg:#0b0b0c; --text:#ffffff; --muted:#b8b8b8;
      --brand:#6BFF57; --brand2:#39d98a;
      --shadow:0 10px 35px rgba(0,0,0,.45);
      --radius:16px; --max:920px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 12% 0%, rgba(107,255,87,.10), transparent 60%),
        radial-gradient(900px 500px at 88% 12%, rgba(57,217,138,.10), transparent 60%),
        var(--bg);
      color:var(--text); line-height:1.55;
    }
    a{color:var(--brand);text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:var(--max); margin:0 auto; padding:24px}
    header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 0 16px}
    header img{height:44px;width:auto;border-radius:10px}
    .nav{display:flex;gap:12px;flex-wrap:wrap;font-size:.95rem}
    .nav a{color:var(--muted)}
    .nav a:hover{color:var(--text);text-decoration:none}

    .card{
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .kicker{color:var(--brand2);font-weight:800;text-transform:uppercase;letter-spacing:.12em;font-size:.78rem}
    h1{margin:8px 0 8px;font-size:clamp(1.55rem,2.2vw,2.05rem);line-height:1.15}
    p{margin:0 0 12px;color:var(--muted)}

    form{margin-top:10px}
    label{display:block;font-weight:800;margin:12px 0 6px;font-size:.95rem}
    input,select,textarea{
      width:100%; padding:12px 12px; border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:#0b0b0c;
      color:var(--text); outline:none;
    }

    select, select option {
      background:#0b0b0c !important;
      color:var(--text) !important;
    }
    textarea{min-height:140px;resize:vertical}
    input:focus,select:focus,textarea:focus{
      border-color: rgba(107,255,87,.65);
      box-shadow: 0 0 0 4px rgba(107,255,87,.12);
    }
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:820px){.row{grid-template-columns:1fr}}

    .actions{margin-top:14px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      color:var(--text); font-weight:900; cursor:pointer;
    }
    .btn-primary{
      background:linear-gradient(135deg, rgba(107,255,87,.95), rgba(57,217,138,.95));
      border-color:transparent; color:#0b0b0c;
    }
    .fine{margin-top:12px;font-size:.92rem;color:var(--muted)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <a href="https://www.condinerolibre.com/" aria-label="Portal CDL">
        <img src="https://ik.imagekit.io/primel/ConDineroLibreImages/logocdl.png?updatedAt=1766903325070" alt="ConDineroLibre" />
      </a>
      <nav class="nav" aria-label="Navegación">
        <a href="/cdl-portal/login/">Login</a>
        <a href="/cdl-portal/registro/">Registro</a>
        <a href="https://www.condinerolibre.com" target="_blank" rel="noopener">Web</a>
      </nav>
    </header>

    <main class="card">
      <div class="kicker">Contacto general</div>
      <h1>Escríbenos</h1>
      <p>Te respondemos por email. Si es un tema técnico, describe los pasos y el error exacto.</p>

      <form name="contacto-cdl" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contacto/gracias/">
        <input type="hidden" name="form-name" value="contacto-cdl" />
        <p class="sr-only">
          <label>No rellenes esto: <input name="bot-field" /></label>
        </p>

        <!-- Origen para saber desde qué proyecto vino -->
        <input type="hidden" name="origen" id="origen" />
        <input type="hidden" name="pagina" id="pagina" />

        <div class="row">
          <div>
            <label for="nombre">Nombre *</label>
            <input id="nombre" name="nombre" autocomplete="name" required />
          </div>
          <div>
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
        </div>

        <label for="tema">Tema *</label>
        <select id="tema" name="tema" required>
          <option value="" selected disabled>Selecciona…</option>
          <option>Formación</option>
          <option>Portal (login/registro)</option>
          <option>Brokers / Afiliación</option>
          <option>Prop Firms</option>
          <option>Negocio / Colaboración</option>
          <option>Otro</option>
        </select>

        <label for="mensaje">Mensaje *</label>
        <textarea id="mensaje" name="mensaje" required placeholder="Cuéntanos tu caso en 3–6 líneas."></textarea>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Enviar</button>
          <a class="btn" href="https://www.condinerolibre.com/">Volver</a>
        </div>

        <div class="fine">
          Aviso: contenido educativo. No es asesoramiento financiero.
        </div>
      </form>
    </main>

    <footer class="fine">
      © <span id="y"></span> ConDineroLibre
    </footer>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
    document.getElementById("origen").value = document.referrer || "directo";
    document.getElementById("pagina").value = location.href;
  </script>
</body>
</html>
