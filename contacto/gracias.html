<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />

  <meta name="description" content="Tu mensaje ha sido enviado correctamente. Te responderemos lo antes posible." />
  <meta name="robots" content="noindex,follow" />

  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Mensaje enviado · ConDineroLibre</title>

  <!-- Fonts / Icons / Tailwind -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Noto+Sans:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#39E079",
            "background-light": "#f6f8f7",
            "background-dark": "#122017",
            "surface-dark": "#1c2633",
            "surface-darker": "#111822"
          },
          fontFamily: {
            display: "Lexend",
            body: ["Noto Sans", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    html { scroll-behavior: smooth; }
  </style>

  <link rel="stylesheet" href="/shared/cdl-shell.css">
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-50 font-display antialiased selection:bg-primary selection:text-white">

  <!-- Header y mobile menu se cargan dinámicamente desde /shared/header.html -->

<!-- MAIN CONTENT -->
<main class="relative flex flex-col items-center w-full min-h-screen pt-8 pb-20">
  <div class="w-full max-w-4xl px-4 md:px-8">

    <!-- SUCCESS MESSAGE -->
    <div class="flex flex-col items-center text-center gap-8 py-12">
      
      <!-- Icon -->
      <div class="flex items-center justify-center w-24 h-24 bg-emerald-500/10 border-2 border-emerald-400/30 rounded-full">
        <span class="material-symbols-outlined text-emerald-400 text-6xl">check_circle</span>
      </div>

      <!-- Title -->
      <div class="flex flex-col gap-4">
        <h1 class="text-white text-4xl md:text-5xl font-black leading-tight">
          ¡Enviado! ✅
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto">
          Gracias. Te responderemos lo antes posible.
        </p>
      </div>

      <!-- CTA Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 mt-4">
        <a 
          href="https://www.condinerolibre.com/" 
          class="px-8 py-3 bg-gradient-to-r from-emerald-500 to-primary text-black font-bold rounded-lg hover:from-emerald-400 hover:to-emerald-300 transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-[1.02] flex items-center justify-center gap-2"
        >
          <span class="material-symbols-outlined">home</span>
          Volver al inicio
        </a>
        <a 
          href="/cursos/" 
          class="px-8 py-3 bg-surface-dark border border-slate-700 text-white font-bold rounded-lg hover:bg-slate-800 hover:border-slate-600 transition-all duration-300 flex items-center justify-center gap-2"
        >
          <span class="material-symbols-outlined">play_circle</span>
          Ver cursos
        </a>
      </div>

      <!-- Info Box -->
      <div class="bg-surface-dark border border-slate-800 rounded-xl p-6 max-w-2xl w-full mt-8">
        <h3 class="text-white font-bold text-lg mb-3">Mientras tanto...</h3>
        <p class="text-slate-400 text-sm leading-relaxed mb-4">
          Explora nuestros cursos gratuitos y guías de trading mientras esperamos tu respuesta.
        </p>
        <div class="flex flex-col gap-2">
          <a href="/aprende/" class="flex items-center gap-2 text-primary hover:text-emerald-300 text-sm font-semibold transition">
            <span class="material-symbols-outlined text-base">school</span>
            Guías de aprendizaje
          </a>
          <a href="/cdl-portal/registro/" class="flex items-center gap-2 text-primary hover:text-emerald-300 text-sm font-semibold transition">
            <span class="material-symbols-outlined text-base">person_add</span>
            Crear cuenta gratuita
          </a>
        </div>
      </div>

    </div>

  </div>
</main>

  <!-- Footer se carga dinámicamente desde /shared/footer.html -->

  <script defer src="/shared/cdl-shell.js"></script>
</body>
</html>
