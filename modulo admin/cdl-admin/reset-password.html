<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: #f4f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 2rem 2.5rem;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      max-width: 350px;
      width: 100%;
    }
    h2 {
      margin-bottom: 1.5rem;
      color: #2d3748;
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #4a5568;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      margin-bottom: 1.2rem;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2563eb;
    }
    .message {
      margin-top: 1rem;
      text-align: center;
      color: #38a169;
    }
    .error {
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Recuperar Contraseña</h2>
    <form id="resetForm">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" required placeholder="tu@email.com" />
      <button type="submit">Enviar enlace</button>
    </form>
    <div id="message" class="message"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://yhgqmbexjscojlrzguvh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NMK2BWWCVOIpXPRVguUwBQ_oWUzzlhj';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('resetForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.textContent = '';
      messageDiv.classList.remove('error');
      const email = form.email.value.trim();
      if (!email) {
        messageDiv.textContent = 'Por favor, ingresa tu correo.';
        messageDiv.classList.add('error');
        return;
      }
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html'
        });
        if (error) {
          messageDiv.textContent = error.message;
          messageDiv.classList.add('error');
        } else {
          messageDiv.textContent = '¡Revisa tu correo para el enlace de recuperación!';
          messageDiv.classList.remove('error');
        }
      } catch (err) {
        messageDiv.textContent = 'Ocurrió un error. Intenta de nuevo.';
        messageDiv.classList.add('error');
      }
    });
  </script>
</body>
</html>
