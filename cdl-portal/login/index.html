<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/cdl-portal/favicon.ico" type="image/x-icon" />
  <title>Login · CDL Portal</title>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family: Arial, sans-serif;
      min-height:100vh;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .box {
      width:100%;
      max-width:420px;
      background:#141414;
      padding:32px;
      border-radius:14px;
      border:1px solid #222;
      box-shadow:0 20px 50px rgba(0,0,0,.6);
    }
    h1 { text-align:center; margin:0 0 18px; font-size:2rem; }
    label { display:block; margin-top:14px; font-size:.9rem; color:#ccc; }
    .input-wrapper { position:relative; margin-top:6px; }
    input {
      width:100%;
      padding:10px;
      padding-right:10px;
      border-radius:8px;
      border:1px solid #333;
      background:#1f1f1f;
      color:#fff;
      font-size:1rem;
      box-sizing:border-box;
    }
    input.with-toggle { padding-right:42px; }
    .toggle-password {
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#999;
      transition:color .2s;
      width:20px;
      height:20px;
    }
    .toggle-password:hover { color:#fff; }
    .toggle-password svg { width:18px; height:18px; stroke-width:2; }
    button {
      width:100%;
      margin-top:20px;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#22c55e;
      color:#001;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
    }
    button:hover { opacity:.9; }
    .msg { margin-top:14px; text-align:center; font-size:.95rem; }
    .links { margin-top:18px; text-align:center; font-size:.9rem; }
    .links a { color:#7dd3fc; text-decoration:none; }
    .links a:hover { text-decoration:underline; }
  </style>
</head>

<body>
  <div class="box">
    <h1>CDL Portal</h1>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" required style="margin-top:6px;" />

      <label for="password">Contraseña</label>
      <div class="input-wrapper">
        <input type="password" id="password" class="with-toggle" required />
        <span class="toggle-password" onclick="togglePassword('password', this)">
          <i data-lucide="eye"></i>
        </span>
      </div>

      <button type="submit" id="btn">Entrar</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="links">
      ¿No tienes cuenta?
      <a id="registroLink" href="../registro/">Crear cuenta</a>
    </div>

    <div class="links" style="margin-top:10px;">
      <a href="../recuperar-password/">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <!-- Supabase v2 (igual que registro) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yhgqmbexjscojlrzguvh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZ3FtYmV4anNjb2pscnpndXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzA1NTcsImV4cCI6MjA4Mjc0NjU1N30.uXFLknfgsZ_3yH5t9cW0dfbwN_b3uOi6jcfM06inVu4";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Toggle password visibility
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      const iconElement = icon.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        iconElement.setAttribute('data-lucide', 'eye-off');
        lucide.createIcons();
      } else {
        input.type = 'password';
        iconElement.setAttribute('data-lucide', 'eye');
        lucide.createIcons();
      }
    }

    const form = document.getElementById("login-form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function show(t, c="#ccc"){ msg.textContent=t; msg.style.color=c; }

    // next
    function normalizePortalPath(path) {
      if (!path) return path;
      const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
      if (!isLocal) return path;
      if (path.startsWith('/cdl-portal/')) {
        return `/modulo%20portal/cdl-portal/${path.slice('/cdl-portal/'.length)}`;
      }
      return path;
    }

    const params = new URLSearchParams(window.location.search);
    const next = params.get("next");
    const fallback = "../dashboard/";
    const destination = normalizePortalPath(next || fallback);

    const registroLink = document.getElementById("registroLink");
    if (registroLink && next) {
      registroLink.href = `../registro/?next=${encodeURIComponent(next)}`;
    }

    // Si ya hay sesión -> entra
    (async () => {
      const { data: { session }, error } = await sb.auth.getSession();
      if (error) console.log("getSession error:", error);
      if (session) window.location.replace(destination);
    })();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      show("Validando acceso…");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        show(error.message || "No se pudo iniciar sesión", "salmon");
        btn.disabled = false;
        return;
      }

      show("Acceso correcto. Redirigiendo…", "#7CFCB2");
      
      // 🕵️ Registrar login exitoso
      try {
        await sb.from("audit_events").insert({
          user_id: data.user.id,
          event_type: "Login exitoso",
          metadata: { email: email, timestamp: new Date().toISOString() },
          created_at: new Date().toISOString()
        });
      } catch(e) { console.log("Audit log:", e); }
      
      setTimeout(() => window.location.replace(destination), 300);
    });
    
    // Inicializar iconos Lucide
    lucide.createIcons();
  </script>
</body>
</html>
