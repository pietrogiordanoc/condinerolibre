<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <title>Actualizar contraseña · CDL Portal</title>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family: Arial, sans-serif;
      min-height:100vh;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .box {
      width:100%;
      max-width:420px;
      background:#141414;
      padding:32px;
      border-radius:14px;
      border:1px solid #222;
      box-shadow:0 20px 50px rgba(0,0,0,.6);
    }
    h1 { text-align:center; margin:0 0 12px; font-size:2rem; }
    p.subtitle {
      text-align:center;
      margin:0 0 18px;
      color:#bdbdbd;
      font-size:.95rem;
      line-height:1.4;
    }
    label { display:block; margin-top:14px; font-size:.9rem; color:#ccc; }
    .input-wrapper { position:relative; margin-top:6px; }
    input {
      width:100%;
      padding:10px;
      padding-right:10px;
      border-radius:8px;
      border:1px solid #333;
      background:#1f1f1f;
      color:#fff;
      font-size:1rem;
      box-sizing:border-box;
    }
    input.with-toggle { padding-right:42px; }
    .toggle-password {
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#999;
      transition:color .2s;
      width:20px;
      height:20px;
    }
    .toggle-password:hover { color:#fff; }
    .toggle-password svg { width:18px; height:18px; stroke-width:2; }
    button {
      width:100%;
      margin-top:20px;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#22c55e;
      color:#001;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
    }
    button:hover { opacity:.9; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .msg { margin-top:14px; text-align:center; font-size:.95rem; }
    .links { margin-top:18px; text-align:center; font-size:.9rem; }
    .links a { color:#7dd3fc; text-decoration:none; }
    .links a:hover { text-decoration:underline; }
    .error-box {
      background: rgba(255, 70, 70, 0.1);
      border: 1px solid rgba(255, 70, 70, 0.3);
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      color: #ff8080;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Nueva contraseña</h1>
    <p class="subtitle">
      Ingresa tu nueva contraseña. Debe tener al menos 6 caracteres.
    </p>

    <div id="loading" style="text-align:center; padding:20px; color:#bdbdbd;">
      Verificando enlace de recuperación...
    </div>

    <div id="error-container" style="display:none;">
      <div class="error-box">
        <strong>⚠️ Enlace inválido o expirado</strong>
        <p style="margin:10px 0 0; font-size:.9rem;">
          El enlace de recuperación ya no es válido. Por favor, solicita uno nuevo.
        </p>
      </div>
      <div class="links" style="margin-top:20px;">
        <a href="../recuperar-password/">Solicitar nuevo enlace</a>
      </div>
    </div>

    <form id="update-form" style="display:none;">
      <label for="password">Nueva contraseña</label>
      <div class="input-wrapper">
        <input type="password" id="password" class="with-toggle" minlength="6" required />
        <span class="toggle-password" onclick="togglePassword('password', this)">
          <i data-lucide="eye"></i>
        </span>
      </div>

      <label for="password2">Confirmar contraseña</label>
      <div class="input-wrapper">
        <input type="password" id="password2" class="with-toggle" minlength="6" required />
        <span class="toggle-password" onclick="togglePassword('password2', this)">
          <i data-lucide="eye"></i>
        </span>
      </div>

      <button type="submit" id="btn">Actualizar contraseña</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="links" id="login-link" style="display:none;">
      <a href="../login/">→ Ir al login</a>
    </div>
  </div>

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yhgqmbexjscojlrzguvh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZ3FtYmV4anNjb2pscnpndXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzA1NTcsImV4cCI6MjA4Mjc0NjU1N30.uXFLknfgsZ_3yH5t9cW0dfbwN_b3uOi6jcfM06inVu4";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Toggle password visibility
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      const iconElement = icon.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        iconElement.setAttribute('data-lucide', 'eye-off');
        lucide.createIcons();
      } else {
        input.type = 'password';
        iconElement.setAttribute('data-lucide', 'eye');
        lucide.createIcons();
      }
    }

    const form = document.getElementById("update-form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");
    const loading = document.getElementById("loading");
    const errorContainer = document.getElementById("error-container");
    const loginLink = document.getElementById("login-link");

    function show(t, c="#ccc"){ msg.textContent=t; msg.style.color=c; }

    // Verificar si llegamos con un token válido
    async function checkRecoverySession() {
      try {
        // Obtener la sesión actual
        const { data: { session }, error } = await sb.auth.getSession();
        
        if (error || !session) {
          // No hay token válido
          loading.style.display = "none";
          errorContainer.style.display = "block";
          return;
        }

        // Token válido, mostrar formulario
        loading.style.display = "none";
        form.style.display = "block";

      } catch (err) {
        console.error("Error checking session:", err);
        loading.style.display = "none";
        errorContainer.style.display = "block";
      }
    }

    // Ejecutar verificación al cargar
    checkRecoverySession();

    // Manejar el formulario de actualización
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      show("Actualizando contraseña…");

      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;

      // Validar que coincidan
      if (password !== password2) {
        show("Las contraseñas no coinciden", "salmon");
        btn.disabled = false;
        return;
      }

      // Validar longitud mínima
      if (password.length < 6) {
        show("La contraseña debe tener al menos 6 caracteres", "salmon");
        btn.disabled = false;
        return;
      }

      // Actualizar contraseña en Supabase
      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        show(error.message || "Error al actualizar la contraseña", "salmon");
        btn.disabled = false;
        return;
      }

      // Éxito
      show("✓ Contraseña actualizada correctamente", "#7CFCB2");
      form.style.display = "none";
      loginLink.style.display = "block";

      // Cerrar sesión automáticamente para que use la nueva contraseña
      await sb.auth.signOut();

      // Redirigir al login después de 2 segundos
      setTimeout(() => {
        window.location.href = "../login/";
      }, 2000);
    });
    
    // Inicializar iconos Lucide cuando el formulario se muestra
    const observer = new MutationObserver(() => {
      lucide.createIcons();
    });
    observer.observe(document.getElementById('update-form'), { attributes: true });
    
    // Inicializar iconos al cargar
    lucide.createIcons();
  </script>
</body>
</html>
