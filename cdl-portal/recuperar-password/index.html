<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/cdl-portal/favicon.ico" type="image/x-icon" />
  <title>Recuperar contraseña · CDL Portal</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family: Arial, sans-serif;
      min-height:100vh;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .box {
      width:100%;
      max-width:420px;
      background:#141414;
      padding:32px;
      border-radius:14px;
      border:1px solid #222;
      box-shadow:0 20px 50px rgba(0,0,0,.6);
    }
    h1 { text-align:center; margin:0 0 12px; font-size:2rem; }
    p.subtitle {
      text-align:center;
      margin:0 0 18px;
      color:#bdbdbd;
      font-size:.95rem;
      line-height:1.4;
    }
    label { display:block; margin-top:14px; font-size:.9rem; color:#ccc; }
    input {
      width:100%;
      margin-top:6px;
      padding:10px;
      border-radius:8px;
      border:1px solid #333;
      background:#1f1f1f;
      color:#fff;
      font-size:1rem;
    }
    button {
      width:100%;
      margin-top:20px;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#22c55e;
      color:#001;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
    }
    button:hover { opacity:.9; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .msg { margin-top:14px; text-align:center; font-size:.95rem; }
    .links { margin-top:18px; text-align:center; font-size:.9rem; }
    .links a { color:#7dd3fc; text-decoration:none; }
    .links a:hover { text-decoration:underline; }
  </style>
</head>

<body>
  <div class="box">
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">
      Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <form id="recovery-form">
      <label for="email">Email</label>
      <input type="email" id="email" required />

      <button type="submit" id="btn">Enviar enlace de recuperación</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="links">
      <a href="../login/">← Volver al login</a>
    </div>
  </div>

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yhgqmbexjscojlrzguvh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZ3FtYmV4anNjb2pscnpndXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzA1NTcsImV4cCI6MjA4Mjc0NjU1N30.uXFLknfgsZ_3yH5t9cW0dfbwN_b3uOi6jcfM06inVu4";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("recovery-form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function show(t, c="#ccc"){ msg.textContent=t; msg.style.color=c; }

    function getResetRedirectUrl() {
      const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
      if (isLocal) {
        return window.location.origin + '/modulo%20portal/cdl-portal/actualizar-password/';
      }
      return window.location.origin + '/cdl-portal/actualizar-password/';
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      show("Enviando enlace…");

      const email = document.getElementById("email").value.trim();

      // Enviar email de recuperación
      // redirectTo debe apuntar a tu dominio real (actualiza cuando tengas el dominio)
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: getResetRedirectUrl()
      });

      if (error) {
        show(error.message || "Error al enviar el enlace", "salmon");
        btn.disabled = false;
        return;
      }

      // Siempre mostrar éxito (por seguridad, no revelar si el email existe)
      show("✓ Si el email existe, recibirás un enlace de recuperación.", "#7CFCB2");
      
      // Opcional: redirigir al login después de 5s
      setTimeout(() => {
        window.location.href = "../login/";
      }, 5000);
    });
  </script>
</body>
</html>
