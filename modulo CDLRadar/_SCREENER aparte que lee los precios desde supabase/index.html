<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market Screener Pro</title>
  <style>
    :root { color-scheme: dark; --bg: #0b0f14; --card: #0f1720; --border: #1f2a37; --accent: #3b82f6; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #e6edf3;
    }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }

    /* BARRA SUPERIOR */
    .topbar {
      position: sticky;
      top: 10px;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .top-row { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 18px; margin: 0; font-weight: 800; color: #fff; }

    /* MENÚ DE CATEGORÍAS (BOTONES) */
    .cat-menu { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-btn {
      background: #161b22;
      border: 1px solid var(--border);
      color: #8b949e;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .cat-btn:hover { border-color: #30363d; color: #fff; }
    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* BUSCADOR Y FILTROS */
    .search-row { display: flex; gap: 10px; }
    input {
      flex: 1;
      background: #0b1220;
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      outline: none;
    }
    select { background: #0b1220; border: 1px solid var(--border); color: #fff; border-radius: 10px; padding: 0 10px; }

    /* ENCABEZADO DE TABLA (FUERA) */
    .stickyHead {
      display: grid;
      grid-template-columns: 14% 12% 32% 14% 14% 14%;
      padding: 20px 14px 10px 14px;
      position: sticky;
      top: 160px; /* Ajustado dinámicamente en JS */
      z-index: 90;
      background: var(--bg);
      font-size: 11px;
      color: #8b949e;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .right { text-align: right; }

    /* TABLA */
    .tableWrap {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    tbody td { padding: 14px 12px; border-bottom: 1px solid #132033; font-size: 13px; }
    tr:hover { background: #161b22; }
    
    .sym { font-weight: 700; color: #58a6ff; }
    .badge {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      background: #21262d;
      border: 1px solid var(--border);
      text-transform: uppercase;
    }

    .pill { font-size: 11px; color: #8b949e; margin-right: 10px; }
    .ok { color: #3fb950; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar" id="topbar">
      <div class="top-row">
        <h1>Market Screener</h1>
        <div id="status">
          <span class="pill">Status: <span id="connText" class="ok">Conectado</span></span>
          <span class="pill">Total: <span id="count">0</span></span>
        </div>
      </div>

      <div class="cat-menu" id="catMenu">
        <button class="cat-btn active" data-cat="ALL">Todas</button>
        <button class="cat-btn" data-cat="Forex">Forex</button>
        <button class="cat-btn" data-cat="Stocks">Stocks</button>
        <button class="cat-btn" data-cat="Crypto">Crypto</button>
        <button class="cat-btn" data-cat="Commodities">Commodities</button>
      </div>

      <div class="search-row">
        <input id="search" placeholder="Buscar símbolo o nombre..." />
        <select id="sort">
          <option value="symbol_asc">A-Z</option>
          <option value="updated_desc">Recientes</option>
        </select>
      </div>
    </div>

    <div class="stickyHead" id="stickyHead">
      <div>Símbolo</div>
      <div>Categoría</div>
      <div>Nombre</div>
      <div class="right">Precio</div>
      <div class="right">Vela 5m</div>
      <div class="right">Actualizado</div>
    </div>

    <div class="tableWrap">
      <table>
        <colgroup>
          <col style="width: 14%"><col style="width: 12%"><col style="width: 32%">
          <col style="width: 14%"><col style="width: 14%"><col style="width: 14%">
        </colgroup>
        <tbody id="tbody">
          <tr><td colspan="6" style="text-align:center; padding:40px;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { CONFIG } from "./config.js";

    const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    
    let rawData = [];
    let currentCat = "ALL";

    const els = {
      tbody: document.getElementById("tbody"),
      search: document.getElementById("search"),
      sort: document.getElementById("sort"),
      count: document.getElementById("count"),
      catButtons: document.querySelectorAll(".cat-btn"),
      topbar: document.getElementById("topbar"),
      stickyHead: document.getElementById("stickyHead")
    };

    // --- LÓGICA DE FILTRADO MEJORADA ---
    function getNormalizedType(item) {
      const type = (item.data?.type || "").toLowerCase().trim();
      // Mapeo exhaustivo para "Stocks"
      if (["stock", "stocks", "equity", "equities", "acciones"].includes(type)) return "stocks";
      if (["crypto", "cryptocurrency"].includes(type)) return "crypto";
      if (["forex", "fx", "currency"].includes(type)) return "forex";
      if (["commodity", "commodities", "metals"].includes(type)) return "commodities";
      return type;
    }

    function applyFilters() {
      const q = els.search.value.toLowerCase();
      
      let filtered = rawData.filter(item => {
        const typeMatch = currentCat === "ALL" || getNormalizedType(item) === currentCat.toLowerCase();
        const searchMatch = item.symbol.toLowerCase().includes(q) || 
                           (item.data?.name || "").toLowerCase().includes(q);
        return typeMatch && searchMatch;
      });

      if (els.sort.value === "symbol_asc") filtered.sort((a,b) => a.symbol.localeCompare(b.symbol));
      if (els.sort.value === "updated_desc") filtered.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));

      render(filtered);
    }

    function render(rows) {
      els.count.textContent = rows.length;
      if (!rows.length) {
        els.tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:#6e7681;">No hay resultados</td></tr>`;
        return;
      }

      els.tbody.innerHTML = rows.map(r => `
        <tr>
          <td class="sym">${r.symbol}</td>
          <td><span class="badge">${r.data?.type || '—'}</span></td>
          <td style="color:#8b949e">${r.data?.name || '—'}</td>
          <td class="right" style="font-family:monospace">${Number(r.data?.close || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
          <td class="right" style="color:#6e7681">${r.data?.datetime || '—'}</td>
          <td class="right" style="color:#6e7681">${new Date(r.updated_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
        </tr>
      `).join("");
    }

    async function fetchData() {
      const { data, error } = await supabase.from(CONFIG.TABLE).select("*").limit(CONFIG.LIMIT);
      if (!error) {
        rawData = data;
        applyFilters();
      }
    }

    // --- EVENTOS ---
    els.catButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        els.catButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentCat = btn.dataset.cat;
        applyFilters();
      });
    });

    els.search.addEventListener("input", applyFilters);
    els.sort.addEventListener("change", applyFilters);

    function adjustSticky() {
      const h = els.topbar.getBoundingClientRect().height;
      els.stickyHead.style.top = `${h + 20}px`;
    }

    // Inicio
    fetchData();
    setInterval(fetchData, 30000);
    new ResizeObserver(adjustSticky).observe(els.topbar);
  </script>
</body>
</html>
