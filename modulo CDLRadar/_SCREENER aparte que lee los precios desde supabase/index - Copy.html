<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market Screener (Supabase)</title>
  <style>
    :root { color-scheme: dark; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#0b0f14;
      color:#e6edf3;
    }

    .wrap{ max-width:1100px; margin:0 auto; padding:18px; }

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      padding:14px 14px;
      border:1px solid #1f2a37;
      background:#0f1720;
      border-radius:14px;
      position:sticky;
      top:10px;
      z-index:30;
    }

    .title{ display:flex; gap:10px; align-items:baseline; }
    h1{ font-size:16px; margin:0; letter-spacing:.2px; }
    .sub{ font-size:12px; color:#9aa7b5; }

    .controls{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input, select, button{
      background:#0b1220;
      border:1px solid #223044;
      color:#e6edf3;
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      outline:none;
    }
    input{ width:260px; }
    button{ cursor:pointer; }
    button:hover{ border-color:#33507a; }

    .status{
      margin-top:10px;
      font-size:12px;
      color:#9aa7b5;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .pill{
      border:1px solid #223044;
      background:#0f1720;
      padding:6px 10px;
      border-radius:999px;
    }
    .hint{ color:#cbd5e1; }

    /* --- NUEVO ESTILO PARA EL ENCABEZADO SEPARADO --- */
    .stickyHead {
      display: grid;
      /* Estas proporciones deben sumar 100% o coincidir con las de la tabla */
      grid-template-columns: 14% 12% 32% 14% 14% 14%; 
      padding: 12px 14px; /* Alineado con el padding de la tabla */
      margin-top: 20px;
      position: sticky;
      top: var(--head-top, 90px);
      z-index: 20;
      background: #0b0f14; /* Fondo igual al body para que parezca flotar */
    }

    .stickyHead div {
      font-size: 11px;
      color: #8b949e;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tableWrap {
      border: 1px solid #1f2a37;
      background: #0f1720;
      border-radius: 14px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed; /* Importante para que los anchos se respeten */
    }

    tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid #132033;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #161b22; }

    .sym { font-weight: 700; color: #58a6ff; }
    .right { text-align: right; }
    .badge {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-size: 11px;
      background: #0d1117;
    }

    .footer { margin: 20px 0 40px; font-size: 12px; color: #8b949e; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar" id="topbar">
      <div class="title">
        <h1>Market Screener</h1>
        <div class="sub">Supabase · market_cache</div>
      </div>

      <div class="controls">
        <select id="category">
          <option value="ALL">Todas las Categorías</option>
          <option value="Forex">Forex</option>
          <option value="Commodities">Commodities</option>
          <option value="Crypto">Crypto</option>
          <option value="Stocks">Stocks</option>
        </select>
        <input id="search" placeholder="Buscar símbolo..." />
        <select id="sort">
          <option value="symbol_asc">Símbolo A-Z</option>
          <option value="updated_desc">Más recientes</option>
        </select>
        <button id="refreshBtn">Refrescar</button>
      </div>
    </div>

    <div class="status">
      <div class="pill" id="connPill">Status: <span id="connText">—</span></div>
      <div class="pill">Registros: <span class="hint" id="count">0</span></div>
      <div class="pill">Última carga: <span class="hint" id="lastLoad">—</span></div>
    </div>

    <div class="stickyHead" id="stickyHead">
      <div>Símbolo</div>
      <div>Categoría</div>
      <div>Nombre</div>
      <div class="right">Precio</div>
      <div class="right">Vela 5m</div>
      <div class="right">Actualizado</div>
    </div>

    <div class="tableWrap">
      <table>
        <colgroup>
          <col style="width: 14%">
          <col style="width: 12%">
          <col style="width: 32%">
          <col style="width: 14%">
          <col style="width: 14%">
          <col style="width: 14%">
        </colgroup>
        <tbody id="tbody">
          <tr><td colspan="6" class="muted">Cargando datos...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      Sincronizado con base de datos en tiempo real mediante Supabase.
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { CONFIG } from "./config.js";

    const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    const els = {
      topbar: document.getElementById("topbar"),
      stickyHead: document.getElementById("stickyHead"),
      tbody: document.getElementById("tbody"),
      category: document.getElementById("category"),
      search: document.getElementById("search"),
      sort: document.getElementById("sort"),
      refreshBtn: document.getElementById("refreshBtn"),
      count: document.getElementById("count"),
      lastLoad: document.getElementById("lastLoad"),
      connText: document.getElementById("connText"),
      connPill: document.getElementById("connPill"),
    };

    let rawRows = [];

    // Funciones de utilidad (mantenidas de tu original)
    function setConn(state, text){
      els.connText.textContent = text;
      els.connPill.className = "pill " + state;
    }

    function safeStr(v){ return (v ?? "").toString(); }
    
    function formatTime(ts){
      if(!ts) return "—";
      return new Date(ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function getPrice(row){
      const val = row?.data?.close;
      return val ? Number(val).toLocaleString(undefined, { minimumFractionDigits: 2 }) : "—";
    }

    function applyFilters(rows){
      const cat = els.category.value;
      const q = els.search.value.toLowerCase();
      let out = rows.filter(r => {
        const matchesCat = cat === "ALL" || (r.data?.type || "").toLowerCase().includes(cat.toLowerCase());
        const matchesSearch = r.symbol.toLowerCase().includes(q) || (r.data?.name || "").toLowerCase().includes(q);
        return matchesCat && matchesSearch;
      });
      
      if(els.sort.value === "symbol_asc") out.sort((a,b)=> a.symbol.localeCompare(b.symbol));
      if(els.sort.value === "updated_desc") out.sort((a,b)=> new Date(b.updated_at) - new Date(a.updated_at));
      return out;
    }

    function render(rows){
      els.count.textContent = rows.length;
      if(!rows.length){
        els.tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:#9aa7b5;">No se encontraron resultados</td></tr>`;
        return;
      }

      els.tbody.innerHTML = rows.map(r => `
        <tr>
          <td class="sym">${r.symbol}</td>
          <td><span class="badge">${r.data?.type || '—'}</span></td>
          <td style="color:#9aa7b5">${r.data?.name || '—'}</td>
          <td class="right" style="font-family:monospace; font-size:14px">${getPrice(r)}</td>
          <td class="right" style="color:#8b949e">${r.data?.datetime || '—'}</td>
          <td class="right" style="color:#8b949e">${formatTime(r.updated_at)}</td>
        </tr>
      `).join("");
    }

    async function load(){
      setConn("warn", "Cargando...");
      const { data, error } = await supabase.from(CONFIG.TABLE).select("*").limit(CONFIG.LIMIT);
      if(error) {
        setConn("err", "Error");
        return;
      }
      rawRows = data;
      setConn("ok", "Conectado");
      render(applyFilters(rawRows));
      els.lastLoad.textContent = new Date().toLocaleTimeString();
    }

    // Eventos
    [els.category, els.sort, els.search].forEach(el => el.addEventListener("input", () => render(applyFilters(rawRows))));
    els.refreshBtn.addEventListener("click", load);

    // Ajuste dinámico de posición sticky
    function updateStickyTop(){
      const h = els.topbar.getBoundingClientRect().height;
      document.documentElement.style.setProperty("--head-top", `${h + 20}px`);
    }

    load();
    window.addEventListener("resize", updateStickyTop);
    new ResizeObserver(updateStickyTop).observe(els.topbar);
    setInterval(load, CONFIG.AUTO_REFRESH_MS || 30000);
  </script>
</body>
</html>
